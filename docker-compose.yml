version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: malikina-db
    environment:
      POSTGRES_USER: ${DB_USER:-malikina}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: ${DB_NAME:-malikina}
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-malikina}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - malikina-network
    restart: unless-stopped

  # PgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: malikina-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@malikina.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password_change_me}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - malikina-network
    restart: unless-stopped
    profiles:
      - debug  # Only run in debug mode: docker-compose --profile debug up

  # Node.js API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: malikina-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-malikina}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      DB_NAME: ${DB_NAME:-malikina}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      OCR_SPACE_API_KEY: ${OCR_SPACE_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/public/audios:/app/public/audios
    networks:
      - malikina-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis Cache (optional, for future optimization)
  redis:
    image: redis:7-alpine
    container_name: malikina-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - malikina-network
    restart: unless-stopped
    profiles:
      - cache  # Only run when needed: docker-compose --profile cache up

volumes:
  postgres_data:
  redis_data:

networks:
  malikina-network:
    driver: bridge
